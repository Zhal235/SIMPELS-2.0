<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <!-- PWA icons & favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <!-- PWA meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SIMPELS" />
    <meta name="application-name" content="SIMPELS 2.0" />
    <meta name="msapplication-TileColor" content="#1e40af" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <meta name="description" content="Sistem Informasi Manajemen Pesantren - SIMPELS 2.0" />
    <title>SIMPELS 2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Auto-update checker untuk PWA frontend -->
    <script>
      if ('serviceWorker' in navigator) {
        // Cek update service worker setiap kali dibuka dari home screen
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(function(reg) {
          // Force check update saat PWA dibuka
          reg.update().catch(function(err) {
            console.warn('SW update check failed:', err);
          });
          
          // Auto-reload jika ada service worker baru
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // Ada versi baru, reload otomatis dalam 2 detik
                  console.log('New version available, reloading...');
                  setTimeout(function() {
                    window.location.reload(true);
                  }, 2000);
                }
              });
            }
          });
          
          // Cek update berkala tiap 30 detik saat app dibuka
          setInterval(function() {
            reg.update();
          }, 30000);
        }).catch(function(err) {
          console.warn('SW registration failed:', err);
        });
      }
    </script>
  </body>
</html>
