[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_20", "unzip", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.bcmath", "php82Extensions.zip", "php82Extensions.intl", "php82Extensions.gd", "php82Extensions.mbstring", "php82Extensions.openssl", "php82Extensions.xml", "php82Extensions.tokenizer", "php82Extensions.curl", "php82Extensions.redis", "git"]

[phases.install]
cmds = [
    "mkdir -p bootstrap/cache",
    "export COMPOSER_MEMORY_LIMIT=-1",
    "composer install --ignore-platform-reqs --no-scripts --no-interaction --prefer-dist",
    "npm install"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan route:cache",
    "php artisan view:cache"
]

# PHP_CLI_SERVER_WORKERS allows concurrent request handling
# (fallback jika masih pakai nixpacks, ganti ke Dockerfile untuk production-grade)
[variables]
PHP_CLI_SERVER_WORKERS = "8"

[start]
cmd = "php artisan optimize:clear && php artisan config:cache && php artisan migrate --force --no-interaction ; (while true; do php artisan schedule:run >> /dev/null 2>&1; sleep 60; done) & php artisan queue:work --queue=default --tries=3 --timeout=30 --sleep=3 & php artisan serve --host=0.0.0.0 --port=$PORT"
