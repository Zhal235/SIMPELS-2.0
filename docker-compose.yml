services:
  # ─── Database ────────────────────────────────────────────────────────────────
  db:
    image: mariadb:11
    container_name: simpels_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-simpels_local}
      MYSQL_USER: ${DB_USERNAME:-simpels}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Cache + Queue + Session) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: simpels_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (Laravel + PHP-FPM) ──────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: simpels_backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env.docker
    volumes:
      - ./Backend:/var/www
      - backend_storage:/var/www/storage/app/public
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Nginx (Backend gateway) ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: simpels_nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./Backend:/var/www
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  # ─── Frontend (Vite dev) ──────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: simpels_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8001/api

  # ─── Redis Commander (Cache Management UI) ───────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: simpels_redis_ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-redispassword}
    ports:
      - "8081:8081"
    depends_on:
      - redis

  # ─── WA Gateway (whatsapp-web.js) ─────────────────────────────────────────────
  wa-gateway:
    build:
      context: ./wa-gateway
      dockerfile: Dockerfile
    container_name: simpels_wa_gateway
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - wa_session:/app/.wwebjs_auth
    environment:
      - PORT=3100
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      - LARAVEL_CALLBACK_URL=http://nginx/api/v1/wa/callback
      - WA_CALLBACK_SECRET=${WA_GATEWAY_SECRET:-change_this_secret}
      - WA_QUEUE_NAME=wa_messages
    depends_on:
      redis:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
  backend_storage:
  wa_session:
