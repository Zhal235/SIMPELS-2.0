<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SIMPELS Mobile - Aplikasi PWA untuk Wali Santri">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SIMPELS Mobile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <meta name="theme-color" content="#1ABC9C">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="shortcut icon" type="image/png" href="favicon.png"/>
  
  <title>SIMPELS Mobile</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    body {
      margin: 0;
      background-color: #1ABC9C;
    }
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #1ABC9C;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .loading-icon {
      width: 100px;
      height: 100px;
      background-image: url('icons/Icon-192.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    .loading-text {
      color: white;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <script>
    // The value below is injected by flutter build, do not touch.
    var serviceWorkerVersion = null;
    
    // Auto-update checker untuk PWA - cek update setiap dibuka dari home screen
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('firebase-messaging-sw.js').then(function() {
        console.log('firebase-messaging-sw.js registered');
      }).catch(function(err) {
        console.error('firebase-messaging-sw.js registration failed:', err);
      });

      navigator.serviceWorker.getRegistration().then(function(reg) {
        if (reg) {
          // Cek update service worker setiap kali PWA dibuka
          reg.update().then(function() {
            console.log('Service worker update check completed');
          }).catch(function(err) {
            console.warn('Service worker update check failed:', err);
          });
          
          // Auto-reload jika ada service worker baru yang waiting
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // Ada update baru, reload otomatis tanpa popup
                  console.log('New version available, reloading...');
                  setTimeout(function() {
                    window.location.reload(true);
                  }, 2000);
                }
              });
            }
          });
        }
      });
      
      // Cek berkala setiap 30 detik saat app sedang dibuka
      setInterval(function() {
        navigator.serviceWorker.getRegistration().then(function(reg) {
          if (reg) {
            reg.update();
          }
        });
      }, 30000);
    }
    
    // Download main.dart.js
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
            // Hide loading screen after app starts
            setTimeout(function() {
              const loading = document.getElementById('loading');
              if (loading) {
                loading.style.opacity = '0';
                loading.style.transition = 'opacity 0.5s';
                setTimeout(() => loading.remove(), 500);
              }
            }, 1000);
          });
        }
      });
    });
  </script>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading" id="loading">
    <div class="loading-icon"></div>
    <div class="loading-text">SIMPELS Mobile</div>
    <div class="loading-spinner"></div>
  </div>

  <!-- Firebase SDK for Web (FCM Push Notifications) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
  <script>
    // Firebase Configuration for PWA
    const firebaseConfig = {
      apiKey: "AIzaSyDb4HCIj2NooINTG8C2NgIiSOF_0hm6IdA",
      authDomain: "simpels-faf58.firebaseapp.com",
      projectId: "simpels-faf58",
      storageBucket: "simpels-faf58.firebasestorage.app",
      messagingSenderId: "784979401590",
      appId: "1:784979401590:web:15a31c1e07210d66413857",
      measurementId: "G-JWL6DLJ55N"
    };

    // Initialize Firebase
    if (typeof firebase !== 'undefined' && firebase.apps.length === 0) {
      firebase.initializeApp(firebaseConfig);
      console.log('Firebase initialized for PWA');
    }
  </script>

  <script src="flutter.js" defer></script>
</body>
</html>
